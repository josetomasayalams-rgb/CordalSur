name: Validate CordalSur

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run landing gates
        run: bash tests/verify-gates.sh
