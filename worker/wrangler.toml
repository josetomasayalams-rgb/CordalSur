name = "cordal-sur-access"
main = "src/index.js"
compatibility_date = "2025-04-01"

[vars]
# Exact origins only. Local ports support the checked-in visual test harness;
# tokens remain origin-scoped in browser storage and are never cookie-based.
ALLOWED_ORIGINS = "https://josetomasayalams-rgb.github.io,http://127.0.0.1:4174,http://localhost:4174,http://127.0.0.1:8765,http://localhost:8765"
TOKEN_ISSUER = "cordal-sur-access"

[[d1_databases]]
binding = "DB"
database_name = "cordal-sur-access"
database_id = "cc2078f8-fdda-4f23-b07d-fb5a3ae5461d"
migrations_dir = "migrations"

[env.dev.vars]
ALLOWED_ORIGINS = "http://127.0.0.1:8765,http://localhost:8765"
TOKEN_ISSUER = "cordal-sur-access-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "cordal-sur-access-dev"
database_id = "REPLACE_WITH_DEV_D1_DATABASE_ID"
migrations_dir = "migrations"
